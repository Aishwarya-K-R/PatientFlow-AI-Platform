apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:

      - job_name: 'auth-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['auth-service:4005']

      - job_name: 'patient-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['patient-service:5244']

      - job_name: 'billing-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['billing-service:9001']

      - job_name: 'api-gateway'
        metrics_path: /metrics
        static_configs:
          - targets: ['api-gateway:4004']